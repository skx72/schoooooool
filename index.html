<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 아침 필사 생성기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div class="max-w-xl w-full bg-white shadow-md rounded-xl p-6 border border-gray-200">
        <div class="mb-4">
            <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">📝 우리반 맞춤형 아침 필사</h1>
            <p class="text-gray-500 text-xs">made by 한준서</p>
        </div>

        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1">✨ 오늘 원하는 학급 감성/테마</label>
            <input type="text" id="moodInput" placeholder="예: 자신감 넘치는, 활기찬 아침, 차분한 위로 (비워두면 기본값)" class="w-full p-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500">
        </div>

        <div class="flex gap-2 mb-2">
            <button id="generateBtn" onclick="fetchQuote()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md text-sm transition duration-150 cursor-pointer">
                🔮 감성에 맞는 필사 글감 찾기
            </button>
            <button onclick="clearHistory()" class="bg-gray-200 hover:bg-gray-300 text-gray-600 font-medium py-2 px-3 rounded-md text-xs transition duration-150 cursor-pointer" title="중복 방지 기록 초기화">
                🔄 기록 리셋
            </button>
        </div>
        <div id="historyCount" class="text-[11px] text-gray-400 text-right">현재 기억된 중복 방지 글귀: 0개</div>

        <div id="loading" class="hidden text-center my-6 text-sm text-indigo-600 animate-pulse">
            📚 검증된 진짜 명작 중에서 글귀를 엄선하는 중입니다...
        </div>

        <div id="resultContainer" class="hidden mt-4 border-t border-gray-200 pt-4">
            <div id="quoteContent" class="text-base text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50 p-4 rounded-lg border border-gray-200 font-sans">
                </div>
        </div>
    </div>

    <script>
        // ⚠️ 여기에 본인의 OpenAI API 키를 붙여넣으세요! (sk-...로 시작하는 긴 문자열)
        const apiKey = "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";

        // 초기 세팅
        updateHistoryCount();

        function updateHistoryCount() {
            const history = JSON.parse(localStorage.getItem('used_quotes') || '[]');
            document.getElementById('historyCount').textContent = `현재 기억된 중복 방지 글귀: ${history.length}개`;
        }

        function clearHistory() {
            if(confirm('그동안 보여줬던 글귀 기록을 초기화할까요?')) {
                localStorage.removeItem('used_quotes');
                updateHistoryCount();
                alert('초기화되었습니다.');
            }
        }

        async function fetchQuote() {
            const mood = document.getElementById('moodInput').value.trim() || '자신감을 주고 아침 기분이 좋아지는 긍정적인 감성';
            
            if (!apiKey || apiKey.includes("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")) {
                alert('코드 안의 apiKey 변수에 실제 OpenAI API 키를 입력해주세요!');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const resultContainer = document.getElementById('resultContainer');
            const quoteContent = document.getElementById('quoteContent');

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            const usedQuotes = JSON.parse(localStorage.getItem('used_quotes') || '[]');
            const historyText = usedQuotes.length > 0 ? usedQuotes.join(', ') : '없음';

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            { 
                                role: 'system', 
                                content: `너는 학급 아침 필사 글귀를 추천하는 AI 교사야. 
                                절대 가짜 글귀나 출처를 지어내지 마(할루시네이션 금지). 인터넷 블로그 펌 글이 아니라, 인류 역사상 검증된 유명 작가의 문학 작품(소설, 시, 수필)이나 역사적 위인의 실제 명언만 가져와야 해. 
                                선생님이 이 화면을 보고 칠판에 분필로 직접 적으실 거니까 군더더기 없이 깔끔하게 텍스트를 제공해줘.` 
                            },
                            { 
                                role: 'user', 
                                content: `요청 감성/테마: "${mood}"
                                
                                위 감성에 맞으면서, 하루를 시작하는 학생들에게 '자신감'을 심어주고 '아침 기분이 좋아지게' 만드는 실제 존재하는 구절 딱 1개만 추천해줘.
                                
                                [절대 제외할 이전 출처 목록]: [${historyText}] (여기에 포함된 작품이나 작가는 절대 다시 추천하지 마.)

                                출력 양식:
                                [출처]: 만든 사람 이름 (및 작품명)
                                [본문]: (칠판에 받아 적기 좋게 150~200자 내외, 가독성을 위한 줄바꿈 포함)
                                [선생님의 한마디]: (아이들에게 해줄 따뜻한 격려 1줄)` 
                            }
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const resultText = data.choices[0].message.content;
                    quoteContent.textContent = resultText;
                    resultContainer.classList.remove('hidden');

                    const lines = resultText.split('\n');
                    const sourceLine = lines.find(line => line.includes('[출처]'));
                    if (sourceLine) {
                        const sourceName = sourceLine.replace('[출처]:', '').trim();
                        if (!usedQuotes.includes(sourceName)) {
                            usedQuotes.push(sourceName);
                            localStorage.setItem('used_quotes', JSON.stringify(usedQuotes));
                            updateHistoryCount();
                        }
                    }
                } else {
                    alert('글감을 가져오지 못했습니다. API 키나 크레딧을 확인해주세요.');
                }
            } catch (error) {
                console.error(error);
                alert('오류가 발생했습니다.');
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
