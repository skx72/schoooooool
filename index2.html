<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 점검 안내</title>
    <style>
        /* 기본 스타일 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* 중앙 카드 컨테이너 */
        .container {
            text-align: center;
            background-color: #ffffff;
            padding: 50px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        /* 톱니바퀴 아이콘 애니메이션 */
        .icon-wrapper {
            margin-bottom: 25px;
        }
        
        .gear-icon {
            font-size: 64px;
            display: inline-block;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 텍스트 스타일 */
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #222222;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p.description {
            font-size: 15px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 점검 정보 박스 */
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #3b5bdb;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            text-align: left;
            font-size: 14px;
            color: #495057;
            margin-bottom: 30px;
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: 700;
            color: #3b5bdb;
            width: 80px;
            flex-shrink: 0;
        }

        .info-value {
            color: #212529;
        }

        /* 하단 푸터 */
        .footer {
            font-size: 13px;
            color: #868e96;
        }
        
        .footer a {
            color: #3b5bdb;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <span class="gear-icon">⚙️</span>
        </div>

        <h1>시스템 점검 안내</h1>
        <p class="description">
            더 좋은 사이트를 제공하기 위해<br>
            현재 코드 수정을 진행하고 있습니다.<br>
  
        </p>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">점검 내용</span>
                <span class="info-value">명원,속담 나오는 기능 추가</span>
            </div>
            <div class="info-row">
                <span class="info-label">점검 시간</span>
                <span class="info-value">2026년 7월 12일 10:30 ~ 12:30 (약 2시간)</span>
            </div>
        </div>

        <div class="footer">
            관련 문의: <a href="mailto:hanjunseo141002@gmail.com">hanjunseo141002@gmail.com</a>
        </div>
    </div>

</body>
</html>
