<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리반 아침 필사 (무료 AI)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">📝 우리반 AI 필사 선생님</h1>
        
        <!-- API 키 입력칸 (선생님만 알면 됩니다) -->
        <input type="password" id="apiKey" placeholder="여기에 Gemini API 키를 넣으세요" class="w-full p-2 border rounded mb-4">
        
        <input type="text" id="mood" placeholder="오늘의 감성 (예: 자신감, 위로, 활기)" class="w-full p-2 border rounded mb-4">
        
        <button onclick="getQuote()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">
            AI에게 필사 글감 물어보기
        </button>

        <div id="result" class="mt-6 p-4 bg-gray-50 rounded hidden leading-relaxed text-gray-800 font-serif"></div>
    </div>

    <script>
        async function getQuote() {
            const key = document.getElementById('apiKey').value;
            const mood = document.getElementById('mood').value || '자신감';
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerText = "AI가 책장을 넘기며 글귀를 찾는 중...";
            resultDiv.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `사용자의 감성: ${mood}. 이 감성에 맞는 유명한 문학 작품이나 위인의 명언 중 실제 존재하는 1개를 추천해줘. 반드시 출처(작가/작품명)를 명시하고, 학생들에게 들려줄 따뜻한 한마디를 포함해서 작성해줘.` }] }]
                    })
                });
                const data = await response.json();
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resultDiv.innerText = "오류 발생: API 키를 다시 확인해주세요.";
            }
        }
    </script>
</body>
</html>
